apiVersion: v1
kind: Namespace
metadata:
  name: videorepo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: videos
  namespace: videorepo
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path          # provisiona en /data/k3s-storage (disco 1TB)
  resources:
    requests:
      storage: 200Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: videorepo
  namespace: videorepo
  labels: { app: videorepo }
spec:
  replicas: 1
  selector:
    matchLabels: { app: videorepo }
  strategy:
    type: Recreate                       # el PV es RWO: un solo pod a la vez
  template:
    metadata:
      labels: { app: videorepo }
    spec:
      containers:
        - name: videorepo
          image: ghcr.io/javierarbelaiz/videorepo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: VIDEO_DIR
              value: /data/videos
            - name: TMPDIR
              value: /data/videos/.uploads
          volumeMounts:
            - name: videos
              mountPath: /data/videos
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: videos
          persistentVolumeClaim:
            claimName: videos
---
apiVersion: v1
kind: Service
metadata:
  name: videorepo
  namespace: videorepo
spec:
  type: NodePort
  selector: { app: videorepo }
  ports:
    - port: 80
      targetPort: 4000
      nodePort: 30080                     # http://192.168.1.199:30080
